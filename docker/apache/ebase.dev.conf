<VirtualHost *:80>
    ServerName ebase.dev
    Redirect permanent / https://ebase.dev/
</VirtualHost>

<VirtualHost *:443>
    ServerName ebase.dev
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/ebase.dev.crt
    SSLCertificateKeyFile /etc/apache2/ssl/ebase.dev.key

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/ebase_error.log
    CustomLog ${APACHE_LOG_DIR}/ebase_access.log combined
</VirtualHost>
