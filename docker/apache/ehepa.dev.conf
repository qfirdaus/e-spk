<VirtualHost *:80>
    ServerName ehepa.dev
    Redirect permanent / https://ehepa.dev/
</VirtualHost>

<VirtualHost *:443>
    ServerName ehepa.dev

    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/ehepa.dev.pem
    SSLCertificateKeyFile /etc/apache2/ssl/ehepa.dev-key.pem

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/ehepa_error.log
    CustomLog ${APACHE_LOG_DIR}/ehepa_access.log combined
</VirtualHost>
